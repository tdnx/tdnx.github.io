    Publications:
      - title: A high-resolution atlas of cattle regulatory variants and their cross-species activity in matched human cells
        authors:
          - Rongrong Zhao, Lindsey Plenderleith, Tanmay Debnath, et al.
        publisher: BioRxiv
        releaseDate: 2026-05-06
        url: https://www.biorxiv.org/content/10.64898/2026.05.06.723179v1
        summary: Identifying causal noncoding variants underlying complex traits in cattle remains challenging because high-resolution functional maps of regulatory variation are lacking. Here we combine massively parallel reporter assays with graph genomics to measure autonomous transcriptional activity from >1.5 billion DNA fragments spanning both cattle subspecies. In primary bovine cells, we assay >15 million variants and identify >150,000 expression-modulating variants enriched at cattle eQTL and GWAS loci. This enables the refinement of broad association signals to small sets of candidate functional regulatory variants. Our haplotype-aware framework captures rare, multi-allelic and tightly linked variants poorly resolved by conventional eQTL studies, and quantifies the disproportionate impact of larger variants on transcription. Furthermore, we use these data to train a deep-learning model that successfully predicts bovine promoter activity directly from sequence. Profiling the same cattle DNA in matched primary human cells reveals widespread conservation of promoter and enhancer activity, allelic effects and regulatory grammar, supporting the transfer of annotations and models across species. However, species-dependent effects are enriched in evolutionarily young sequences and p53-family motifs, highlighting the limits to simple cross-species extrapolation. Together, these data provide a high-resolution atlas of cattle regulatory variation and a framework for prioritising causal noncoding variants for cattle trait improvement.

      - title: Deep learning can automate chicken tibia-breaking strength quantification to improve animal welfare
        authors:
          - Tanmay Debnath, et al.
        publisher: Poultry Science
        releaseDate: 2026-04-01
        url: https://www.sciencedirect.com/science/article/pii/S0032579126001768
        summary: Bone damage is an important welfare issue in the poultry industry, yet large-scale phenotyping of chicken bone strength currently relies on time-consuming manual annotation of X-rays or destructive post-mortem testing. To address this, an end-to-end deep-learning pipeline was developed that automatically (i) segments the chicken tibiotarsus from lateral X-ray images (U-Net, Dice = 0.91) and (ii) predicts its breaking strength from pixel intensities alone. Using 916 curated bone images, the predictor achieved moderately high correlation with measured breaking strength (maximum Pearson’s correlation of 0.74), exceeding the performance of a previous labour-intensive manual annotation method. Image-derived predictions were moderately heritable (h² ≈ 0.16) and exhibited an exceptionally high genetic correlation with the physical trait, indicating that selection on the model-derived phenotype is a good proxy to select for bone strength. The workflow therefore provides a potential rapid, non-invasive and genetically informative alternative to post-mortem testing, paving the way for the routine incorporation of bone-quality traits into commercial breeding programmes and improved poultry welfare at scale.

      - title: Automated detection of patterned single-cells within hydrogel using deep learning
        authors:
          - Tanmay Debnath, et al.
        publisher: Scientific Reports
        releaseDate: 2022-10-31
        url: https://www.nature.com/articles/s41598-022-22774-0
        summary: Single-cell analysis has been widely used in various biomedical engineering applications, ranging from cancer diagnostics, and immune response monitoring to drug screening. Single-cell isolation is fundamental for observing single-cell activities and an automatic finding method of accurate and reliable cell detection with few possible human errors is also essential. This paper reports trapping single cells into photo patternable hydrogel microwell arrays and isolating them. Additionally, we present an object detection-based DL algorithm that detects single cells in microwell arrays and predicts the presence of cells in resource-limited environments at the highest possible mAP (mean average precision) of 0.989 with an average inference time of 0.06 s. This algorithm leads to the enhancement of the high-throughput single-cell analysis, establishing high detection precision and reduced experimentation time.

